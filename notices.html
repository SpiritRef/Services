<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>所有公告 | 鬼磕頭</title>
	<style>
		body { font-family: sans-serif; background: #f4f4f4; padding: 20px; color: #333; }
		.list-container { max-width: 800px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
		h1 { border-bottom: 2px solid #c0392b; padding-bottom: 10px; font-size: 1.5rem; }
		.controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f9f9f9; padding: 10px; border-radius: 5px; }
		.item { padding: 15px 0; border-bottom: 1px solid #eee; white-space: pre-line; }
		.date { color: #888; font-size: 0.85rem; font-weight: bold; }
		.pagination { margin-top: 20px; display: flex; gap: 10px; justify-content: center; align-items: center; }
		.page-btn { padding: 5px 12px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
		.page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
		.back-home { display: block; margin-bottom: 20px; text-decoration: none; color: #666; font-size: 0.9rem; }
	</style>
</head>
<body>

<div class="list-container">
	<a href="./index.html" class="back-home">⬅ 返回首頁</a>
	<h1>所有公告記錄</h1>

	<div class="controls">
		<div>每頁顯示：
			<select id="pageSize" onchange="changePageSize()">
				<option value="10">10 條</option>
				<option value="20">20 條</option>
				<option value="50">50 條</option>
				<option value="100">100 條</option>
			</select>
		</div>
		<div id="totalCount">共 0 筆</div>
	</div>

	<div id="list-content">載入中...</div>

	<div class="pagination">
		<button id="prevBtn" class="page-btn" onclick="prevPage()">上一頁</button>
		<span id="pageInfo">第 1 頁</span>
		<button id="nextBtn" class="page-btn" onclick="nextPage()">下一頁</button>
	</div>
</div>

<script>
	const API_URL = "https://script.google.com/macros/s/AKfycbwpmFBBbEt8y9qQETftQktjuAiI1UQKm6Ro_rtGCHTaWRANiFngtDG7UWXnCvHMQbNgdg/exec";
	let allNotices = [];
	let currentPage = 1;
	let pageSize = 10;

	async function loadData() {
		try {
			const res = await fetch(API_URL);
			const data = await res.json();
			allNotices = data.filter(i => i["標題"] === "【公告】").sort((a,b) => new Date(b["發佈日期"]) - new Date(a["發佈日期"]));
			document.getElementById('totalCount').innerText = `共 ${allNotices.length} 筆`;
			render();
		} catch(e) { document.getElementById('list-content').innerText = "無法載入。"; }
	}

	function render() {
		const start = (currentPage - 1) * pageSize;
		const end = start + pageSize;
		const pagedData = allNotices.slice(start, end);

		document.getElementById('list-content').innerHTML = pagedData.map(i => `
			<div class="item">
				<div class="date">[${new Date(i["發佈日期"]).toLocaleDateString()}]</div>
				<div>${i["貼文內容"]}</div>
			</div>
		`).join('');

		document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${Math.ceil(allNotices.length / pageSize)} 頁`;
		document.getElementById('prevBtn').disabled = currentPage === 1;
		document.getElementById('nextBtn').disabled = end >= allNotices.length;
	}

	function changePageSize() {
		pageSize = parseInt(document.getElementById('pageSize').value);
		currentPage = 1;
		render();
	}

	function prevPage() { if(currentPage > 1) { currentPage--; render(); window.scrollTo(0,0); } }
	function nextPage() { if(currentPage * pageSize < allNotices.length) { currentPage++; render(); window.scrollTo(0,0); } }

	loadData();
</script>
</body>
</html>
