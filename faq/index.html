<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常見問題 FAQ | 鬼磕頭</title>
    <link rel="icon" href="../pic/GhostKowtow.jpg" type="image/jpeg">
    <link rel="stylesheet" href="../CSS/Services.css">
    <style>
        .faq-answer {
            margin-top: 10px;
            margin-left: 25px;
            font-size: 0.95em;
            color: #ccc;
            line-height: 1.6;
            display: none; /* 預設隱藏，點擊標題展開 */
        }
        .faq-item {
            cursor: pointer;
            padding: 15px;
            border-bottom: 1px solid #333;
            transition: background 0.3s;
        }
        .faq-item:hover { background: rgba(255, 193, 7, 0.05); }
        .faq-question { font-weight: bold; color: #ffc107; display: flex; align-items: center; gap: 10px; }
        .faq-item.active .faq-answer { display: block; }
        .faq-item.active .faq-question::before { content: "▼"; font-size: 0.8em; }
        .faq-question::before { content: "▶"; font-size: 0.8em; color: #666; }
    </style>
</head>
<body>

<div class="expandable-menu-container" id="menuContainer">
    <div class="menu-content" id="menuContent"></div>
    <button class="floating-service-btn" id="serviceBtn" onclick="toggleMenu()">
        <span id="serviceIcon" style="font-size: 150%;">☰</span>
        <span id="serviceText">選單</span>
    </button>
</div>

<div class="container">
    <header style="margin-bottom: 30px;">
        <a href="../services/" class="back-btn-top" style="color:white; text-decoration:none; display:inline-flex; align-items:center; gap:10px; padding:10px; border-radius:8px;">
            <span>⬅</span><span>返回服務主頁</span>
        </a>
        <h1 style="text-align: center; color: #ffc107; margin-top: 20px;">常見問題 FAQ</h1>
    </header>

    <section class="notice-board">
        <div id="faq-list">
            <p style="text-align: center; padding: 50px; color: #888;">正在感應靈界問答...</p>
        </div>
    </section>
</div>

<footer>
    <p>&copy; 2026 鬼磕頭. All Rights Reserved.</p>
</footer>

<script type="module">
    import { getIni } from '../Javascript/API.js';

    let SERVICE_API_URL = "";
    let allFAQs = [];

    window.toggleMenu = function() {
        const menu = document.getElementById('menuContainer');
        if (menu) menu.classList.toggle('show-menu');
    };

    async function initFAQ() {
        // 1. 讀取快取
        const cached = localStorage.getItem('cache_services');
        if (cached) {
            processAndRender(JSON.parse(cached));
        }

        // 2. 獲取設定並同步
        try {
            const config = await getIni('../settings/Services.ini');
            if (config) {
                // 渲染選單
                if (config.MENU_DATA) renderMenu(config.MENU_DATA);

                // 解析 API
                SERVICE_API_URL = config.SERVICE_API_URL.startsWith("http") ? 
                                 config.SERVICE_API_URL : atob(config.SERVICE_API_URL);
                
                fetchRemoteFAQ();
            }
        } catch (e) { console.error("FAQ 初始化失敗:", e); }
    }

    async function fetchRemoteFAQ() {
        try {
            const res = await fetch(`${SERVICE_API_URL}${SERVICE_API_URL.includes('?') ? '&' : '?'}type=service`);
            if (!res.ok) return;
            const data = await res.json();
            
            if (JSON.stringify(data) !== localStorage.getItem('cache_services')) {
                localStorage.setItem('cache_services', JSON.stringify(data));
                processAndRender(data);
            }
        } catch (e) { console.error("FAQ 同步失敗:", e); }
    }

    function processAndRender(data) {
        // 篩選出標題含「問」的項目
        allFAQs = data.filter(item => {
            const title = String(item["服務名稱"] || item["標題"] || "");
            return title.includes("問");
        });
        renderFAQ();
    }

    function renderFAQ() {
        const container = document.getElementById('faq-list');
        if (!container) return;

        if (allFAQs.length === 0) {
            container.innerHTML = '<p style="text-align: center; padding: 50px;">目前暫無常見問題紀錄。</p>';
            return;
        }

        container.innerHTML = allFAQs.map(item => `
            <div class="faq-item" onclick="this.classList.toggle('active')">
                <div class="faq-question">Q: ${item["服務名稱"] || item["標題"]}</div>
                <div class="faq-answer">A: ${item["服務介紹"] || item["貼文內容"] || item["內容"]}</div>
            </div>
        `).join('');
    }

    function renderMenu(menuData) {
        const menuContent = document.getElementById('menuContent');
        if (!menuContent) return;
        menuContent.innerHTML = menuData.split('|').map(item => {
            const [text, link, icon] = item.split(',');
            return `<a href="../${link}" class="menu-item"><span class="icon">${icon}</span> <span class="text">${text}</span></a>`;
        }).join('');
    }

    window.addEventListener('DOMContentLoaded', initFAQ);
</script>

</body>
</html>
